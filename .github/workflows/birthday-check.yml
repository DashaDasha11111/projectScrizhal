name: Проверка дней рождения клириков

on:
  schedule:
    # 05:00 UTC = 08:00 Москва (UTC+3)
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  birthday-check:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код репозитория
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/scripts/package.json

      - name: Установить зависимости
        working-directory: app/scripts
        run: npm install

      - name: Запустить проверку дней рождения
        working-directory: app/scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node birthday-check.js
